name: Lint packs

# Enforces the pack contract (_schema/pack.frontmatter.md) on every push and PR.
# The navigator builds its manifest from pack frontmatter, so a contract
# violation must never reach the default branch.

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint packs against the contract
        run: npm run lint
